<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rorolee SuperClaw™ — Your AI Workstation. Anywhere.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EEEEF5;
    --surface: #F8F8FC;
    --dark: #0D0D1C;
    --dark2: #181828;
    --violet: #7B6EF5;
    --violet-light: #A99CFA;
    --violet-dim: rgba(123,110,245,0.12);
    --yellow: #F5C33A;
    --text: #1A1A2E;
    --text-mid: #5A5A7A;
    --text-light: #9090B0;
    --border: rgba(0,0,0,0.07);
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
    --shadow-lg: 0 12px 48px rgba(0,0,0,0.13);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  h1, h2, h3, h4, h5 {
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  /* Scroll fade-in */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1);
  }
  .reveal.visible {
    opacity: 1;
    transform: none;
  }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }
  .reveal-delay-5 { transition-delay: 0.5s; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    background: rgba(238,238,245,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }
  .nav-logo {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.22em;
    color: var(--text);
  }
  .nav-links {
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--dark);
    color: #fff !important;
    padding: 9px 20px;
    border-radius: 100px;
    font-weight: 600 !important;
    font-size: 13px !important;
    transition: background 0.2s, transform 0.15s !important;
  }
  .nav-cta:hover { background: var(--violet) !important; transform: translateY(-1px); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 120px 48px 80px;
    gap: 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-left {}
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--violet-dim);
    border: 1px solid rgba(123,110,245,0.2);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--violet);
    letter-spacing: 0.08em;
    margin-bottom: 28px;
  }
  .hero-badge span { width: 6px; height: 6px; background: var(--violet); border-radius: 50%; display: block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }
  .hero h1 {
    font-size: clamp(40px, 5vw, 68px);
    font-weight: 800;
    line-height: 1.07;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 8px;
  }
  .hero h1 sup {
    font-size: 0.4em;
    vertical-align: super;
    font-weight: 500;
    letter-spacing: 0;
  }
  .hero-subtitle {
    font-size: clamp(16px, 2vw, 22px);
    font-weight: 500;
    color: var(--text-mid);
    margin-bottom: 20px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .hero-body {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-mid);
    max-width: 400px;
    margin-bottom: 40px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--dark);
    color: #fff;
    padding: 15px 28px;
    border-radius: 100px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    text-decoration: none;
  }
  .btn-primary:hover {
    background: var(--violet);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(123,110,245,0.35);
  }
  .btn-primary svg { transition: transform 0.2s; }
  .btn-primary:hover svg { transform: translateX(3px); }

  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--text);
    padding: 15px 28px;
    border-radius: 100px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: 15px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .btn-outline:hover { border-color: var(--violet); color: var(--violet); transform: translateY(-1px); }

  /* Hero device area */
  .hero-right {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .hero-device-stage {
    position: relative;
    width: 420px;
    height: 420px;
  }
  .hero-glow {
    position: absolute;
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(123,110,245,0.18) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    border-radius: 50%;
  }
  /* Floating UI cards around device */
  .float-card {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    box-shadow: var(--shadow);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-mid);
    white-space: nowrap;
    animation: float 4s ease-in-out infinite;
  }
  .float-card:nth-child(2) { animation-delay: -1s; }
  .float-card:nth-child(3) { animation-delay: -2s; }
  .float-card:nth-child(4) { animation-delay: -3s; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .float-card .fc-label { color: var(--text-light); font-weight: 400; font-size: 10px; margin-bottom: 2px; }
  .float-card .fc-val { color: var(--text); font-size: 13px; font-weight: 700; }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--violet);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* TEAMMATE SECTION */
  .section-white {
    background: var(--surface);
    border-radius: 32px;
    margin: 0 24px 24px;
    overflow: hidden;
  }
  .teammate-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 0;
    min-height: 480px;
  }
  .teammate-img {
    height: 480px;
    background: linear-gradient(135deg, #1a1035 0%, #2d1f6e 40%, #1e3a5f 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .teammate-img-label {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 100px;
    font-family: monospace;
    letter-spacing: 0.05em;
  }
  .teammate-content {
    padding: 56px 52px;
  }
  .teammate-content h2 {
    font-size: clamp(28px, 3vw, 42px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 16px;
    color: var(--text);
  }
  .teammate-content p {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.65;
    margin-bottom: 40px;
  }
  .feature-trio {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .feature-item h4 {
    font-size: 14px;
    font-weight: 700;
    margin: 10px 0 4px;
    color: var(--text);
  }
  .feature-item p {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.5;
    margin: 0;
  }
  .feature-icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--violet-dim);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* WORKS FOR YOU */
  .section-pad {
    padding: 80px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .section-header {
    text-align: center;
    margin-bottom: 52px;
  }
  .section-header h2 {
    font-size: clamp(22px, 2.5vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .work-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .work-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .work-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }
  .work-card h3 {
    font-size: 15px;
    font-weight: 700;
    margin: 14px 0 8px;
    color: var(--text);
  }
  .work-card p {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  /* HOW IT WORKS */
  .how-section {
    background: var(--surface);
    border-radius: 32px;
    margin: 0 24px 24px;
    padding: 72px 64px;
  }
  .layers-flow {
    display: grid;
    grid-template-columns: 1fr 48px 1fr 48px 1fr;
    align-items: center;
    gap: 0;
    margin-top: 48px;
  }
  .layer-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: default;
    position: relative;
  }
  .layer-card.active, .layer-card:hover {
    border-color: var(--violet);
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(123,110,245,0.15);
  }
  .layer-card h3 {
    font-size: 17px;
    font-weight: 700;
    margin: 14px 0 10px;
    color: var(--text);
  }
  .layer-card p {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .layer-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .layer-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--violet);
    background: var(--violet-dim);
    padding: 3px 8px;
    border-radius: 100px;
  }
  .layer-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--violet-light);
  }

  /* SPECS */
  .specs-section {
    padding: 80px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .specs-layout {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    margin-top: 48px;
    align-items: start;
  }
  .spec-col {}
  .spec-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }
  .spec-row:last-child { border-bottom: none; }
  .spec-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .spec-text {}
  .spec-text strong {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: block;
    margin-bottom: 2px;
  }
  .spec-text span {
    font-size: 12px;
    color: var(--text-mid);
  }

  .spec-device-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 20px;
  }

  /* CTA FOOTER */
  .cta-section {
    background: linear-gradient(135deg, #E8E3FA 0%, #DCD6F5 45%, #CFC7F0 100%);
    border-radius: 32px;
    margin: 0 24px 40px;
    padding: 72px 64px;
    display: flex;
    align-items: center;
    gap: 40px;
    position: relative;
    overflow: hidden;
  }
  .cta-bg-glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 65%);
    right: -80px;
    top: -120px;
    pointer-events: none;
  }
  .cta-device {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    width: 380px;
    height: 340px;
  }
  .cta-device img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    -webkit-mask-image: radial-gradient(ellipse 65% 70% at center, #000 50%, rgba(0,0,0,0.6) 75%, transparent 95%);
    mask-image: radial-gradient(ellipse 65% 70% at center, #000 50%, rgba(0,0,0,0.6) 75%, transparent 95%);
    filter: drop-shadow(0 24px 50px rgba(75, 60, 140, 0.28));
  }
  .cta-content { position: relative; z-index: 1; flex: 1; }
  .cta-content .cta-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(13,13,28,0.08);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
    white-space: nowrap;
  }
  .cta-content .cta-eyebrow span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--yellow);
  }
  .cta-content h2 {
    font-size: clamp(40px, 5vw, 68px);
    font-weight: 800;
    letter-spacing: -0.035em;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1;
  }
  .cta-content p {
    font-size: 16px;
    color: rgba(13,13,28,0.62);
    margin-bottom: 32px;
    line-height: 1.6;
    max-width: 440px;
  }
  .btn-white {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--dark);
    color: #fff;
    padding: 16px 30px;
    border-radius: 100px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-white:hover { background: var(--violet); transform: translateY(-2px); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 32px 48px;
    font-size: 12px;
    color: var(--text-light);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box {
    background: var(--surface);
    border-radius: 24px;
    padding: 48px 40px;
    width: 440px;
    max-width: 90vw;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    animation: slideUp 0.3s cubic-bezier(.22,1,.36,1);
    position: relative;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--bg);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-mid);
    font-size: 18px;
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-box h3 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    color: var(--text);
  }
  .modal-box p { font-size: 14px; color: var(--text-mid); margin-bottom: 28px; line-height: 1.6; }
  .form-field { margin-bottom: 16px; }
  .form-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .form-field input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-field input:focus { border-color: var(--violet); }
  .modal-success {
    text-align: center;
    padding: 20px 0;
  }
  .modal-success .success-icon {
    width: 64px; height: 64px;
    background: var(--violet-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .modal-success h3 { margin-bottom: 8px; }

  /* HERO GALLERY */
  .hero-gallery {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .hero-gallery-main {
    position: relative;
    aspect-ratio: 1;
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.04);
  }
  .hero-gallery-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 24px;
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.5s cubic-bezier(.22,1,.36,1), transform 0.5s cubic-bezier(.22,1,.36,1);
  }
  .hero-gallery-img.active {
    opacity: 1;
    transform: scale(1);
  }
  .hero-view-label {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(13,13,28,0.85);
    backdrop-filter: blur(8px);
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    padding: 6px 12px;
    border-radius: 100px;
  }
  .hero-gallery-thumbs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .hero-thumb {
    aspect-ratio: 1;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .hero-thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 8px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .hero-thumb:hover { transform: translateY(-2px); }
  .hero-thumb:hover img { opacity: 0.85; }
  .hero-thumb.active {
    border-color: var(--violet);
    background: #fff;
  }
  .hero-thumb.active img { opacity: 1; }

  /* SPECS DEVICE LINEUP */
  .spec-device-lineup {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    gap: 8px;
    background: #fff;

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Hero Gallery ────────────────────────────────────────────────────────────
function HeroGallery() {
  const views = [
    { src: 'assets/rorolee/product-01.png', label: 'Right' },
    { src: 'assets/rorolee/product-03.png', label: 'Front' },
    { src: 'assets/rorolee/product-02.png', label: 'Left' },
    { src: 'assets/rorolee/product-04.png', label: 'Back' },
  ];
  const [idx, setIdx] = useState(0);
  const [prev, setPrev] = useState(0);

  const change = (i) => {
    if (i === idx) return;
    setPrev(idx);
    setIdx(i);
  };

  // Auto-rotate every 4s, pause on hover
  const [paused, setPaused] = useState(false);
  useEffect(() => {
    if (paused) return;
    const t = setInterval(() => change((idx + 1) % views.length), 4500);
    return () => clearInterval(t);
  }, [idx, paused]);

  return (
    <div className="hero-gallery" onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
      <div className="hero-gallery-main">
        {views.map((v, i) => (
          <img
            key={v.src}
            src={v.src}
            alt={`Rorolee SuperClaw — ${v.label} view`}
            className={`hero-gallery-img ${i === idx ? 'active' : ''}`}
          />
        ))}
        <div className="hero-view-label">{views[idx].label.toUpperCase()} VIEW</div>
      </div>
      <div className="hero-gallery-thumbs">
        {views.map((v, i) => (
          <button
            key={v.src}
            className={`hero-thumb ${i === idx ? 'active' : ''}`}
            onClick={() => change(i)}
            aria-label={`View ${v.label}`}
          >
            <img src={v.src} alt=""/>
          </button>
        ))}
      </div>
    </div>
  );
}

    weight: <><circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.8" fill="none"/><path d="M12 8v4l3 3" stroke={color} strokeWidth="1.8" strokeLinecap="round"/></>,
    plug: <><path d="M7 22V12M17 22V12M2 12h20M7 12V5l5-2 5 2v7" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/></>,
    arrow: <><line x1="5" y1="12" x2="19" y2="12" stroke={color} strokeWidth="1.8" strokeLinecap="round"/><polyline points="12,5 19,12 12,19" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/></>,
    check: <><polyline points="20,6 9,17 4,12" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18" stroke={color} strokeWidth="2" strokeLinecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke={color} strokeWidth="2" strokeLinecap="round"/></>,
    database: <><ellipse cx="12" cy="5" rx="9" ry="3" stroke={color} strokeWidth="1.8" fill="none"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5M3 12c0 1.7 4 3 9 3s9-1.3 9-3" stroke={color} strokeWidth="1.8" fill="none"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">

};

// ── Scroll Reveal Hook ───────────────────────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => e.isIntersecting && e.target.classList.add('visible')),
      { threshold: 0.12 }
    );
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
}

        </> : (

  );
}
